spring:
  application:
    name: SIGEPAM

  # Project Loom - Virtual Threads
  threads:
    virtual:
      enabled: true

  # --- Database: H2 en memoria (perfil dev) ---
  # Cambia a PostgreSQL cuando tengas la BD lista:
  # datasource:
  #   url: jdbc:postgresql://localhost:5432/sigepam_db
  #   username: postgres
  #   password: postgres
  #   driver-class-name: org.postgresql.Driver

  datasource:
    url: jdbc:h2:file:./data/sigepam_dev
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    # Para H2 (cambiar a PostgreSQLDialect con PostgreSQL):
    database-platform: org.hibernate.dialect.H2Dialect

  # CORS
  web:
    cors:
      allowed-origins: http://localhost:5173
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: "*"
      allow-credentials: true

